<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᴘᴀʀᴀᴅᴏx-ᴘᴠᴘ — Rankings</title>
    <style>
        :root {
            --bg-base: #090d16;
            --bg-panel: rgba(10, 15, 30, 0.75);
            --bg-row-hover: rgba(30, 41, 59, 0.5);
            --border-ui: rgba(255, 255, 255, 0.08);
            
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --color-na: #ef4444;
            --color-eu: #10b981;

            --color-ht: #f59e0b;
            --bg-ht: rgba(245, 158, 11, 0.15);
            --color-lt: #a855f7;
            --bg-lt: rgba(168, 85, 247, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Fixed Background Container for TikTok Embed */
        .video-background-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scale and crop to fit widescreen layouts smoothly */
        .video-background-wrapper iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio aspect constraint */
            min-height: 100vh;
            min-width: 177.77vh;
            border: none;
            opacity: 0.35;
            filter: blur(2px) brightness(0.85) contrast(1.1);
        }

        /* Overlay Vignette to keep interface content legible */
        .video-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle, rgba(9, 13, 22, 0.2) 0%, rgba(9, 13, 22, 0.92) 100%);
        }

        .wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 1;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Category Tabs Navigation Bar */
        .category-nav-bar {
            display: flex;
            gap: 6px;
            padding: 8px 4px 0 4px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-ui);
        }
        .category-nav-bar::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 82px;
            padding: 12px 10px;
            background: rgba(10, 15, 30, 0.4);
            border: 1px solid var(--border-ui);
            border-bottom: none;
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-tab-icon-wrapper {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .nav-tab-icon-wrapper svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .nav-tab-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .nav-tab:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .nav-tab:hover .nav-tab-icon-wrapper {
            transform: translateY(-2px);
            opacity: 0.8;
        }

        .nav-tab.active {
            background: var(--bg-panel);
            border-color: var(--border-ui);
            border-bottom: 1px solid transparent;
            z-index: 2;
        }
        .nav-tab.active .nav-tab-label {
            color: var(--text-main);
        }
        .nav-tab.active .nav-tab-icon-wrapper {
            opacity: 1;
            transform: scale(1.05);
        }
        
        .nav-tab.active .nav-tab-icon-wrapper { color: #38bdf8; }
        .nav-tab[data-mode="overall"].active .nav-tab-icon-wrapper { color: #fbbf24; }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #38bdf8;
        }
        .nav-tab[data-mode="overall"].active::after {
            background-color: #fbbf24;
        }

        /* Main Leaderboard Table Panel */
        .leaderboard-panel {
            background-color: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-ui);
            border-top: none;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            padding: 16px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .row-grid {
            display: grid;
            grid-template-columns: 55px 75px 1fr 100px 240px;
            align-items: center;
            padding: 14px 20px;
        }

        .table-header {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-ui);
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        .text-right { text-align: right; }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .player-row {
            border-radius: 12px;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            border: 1px solid transparent;
        }

        .player-row:hover {
            background-color: var(--bg-row-hover);
            border-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .player-row:nth-child(1) .rank-label { color: #fbbf24; }
        .player-row:nth-child(2) .rank-label { color: #e2e8f0; }
        .player-row:nth-child(3) .rank-label { color: #cd7f32; }

        .rank-label {
            font-size: 18px;
            font-weight: 800;
            font-style: italic;
            color: var(--text-muted);
        }

        .skin-box {
            position: relative;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skin-avatar {
            width: 95%;
            height: 95%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .player-identity {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-left: 8px;
        }

        .username {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .rank-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .points {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .region-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            width: fit-content;
            text-align: center;
        }
        .reg-na { color: var(--color-na); background: rgba(239, 68, 68, 0.15); }
        .reg-eu { color: var(--color-eu); background: rgba(16, 185, 129, 0.15); }

        .tier-matrix-row {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .tier-node {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .node-ht { color: var(--color-ht); background: var(--bg-ht); border-color: rgba(245, 158, 11, 0.25); }
        .node-lt { color: var(--color-lt); background: var(--bg-lt); border-color: rgba(168, 85, 247, 0.25); }

        @media (max-width: 900px) {
            .row-grid { grid-template-columns: 45px 70px 1fr 80px; }
            .tier-matrix-row, .table-header .text-right { display: none; }
        }
    </style>
</head>
<body>

<!-- Fixed Background Container using specific video embed properties -->
<div class="video-background-wrapper">

<div class="wrapper">

    <div class="category-nav-bar">

        <div class="nav-tab active" data-mode="overall">

        </div>
        <div class="nav-tab" data-mode="uhc">
            <div class="nav-tab-icon-wrapper"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>

    <div class="leaderboard-panel">

            <div class="text-right" id="matrix-header-title">Tiers Matrix</div>
        </div>

        <div class="leaderboard-list" id="leaderboard-container"></div>
    </div>
</div>

<script>
    const playersDatabase = [
        { name: "ItzRealMe", region: "NA", points: 330, status: "Combat Master", tiers: { overall: "HT3", ltms: "HT3", vanilla: "HT1", uhc: "HT1", pot: "LT1", nethop: "HT2", smp: "HT3", sword: "HT1", axe: "HT1", mace: "LT1" }},
        { name: "coldified", region: "EU", points: 326, status: "Combat Master", tiers: { overall: "LT1", ltms: "LT1", vanilla: "LT3", uhc: "HT1", pot: "HT2", nethop: "LT1", smp: "LT2", sword: "LT1", axe: "LT3", mace: "HT2" }},
        { name: "Swight", region: "NA", points: 290, status: "Combat Master", tiers: { overall: "HT3", ltms: "LT3", vanilla: "HT1", uhc: "HT2", pot: "HT1", nethop: "LT2", smp: "HT1", sword: "HT3", axe: "LT3", mace: "HT1" }},
        { name: "janekv", region: "EU", points: 260, status: "Combat Master", tiers: { overall: "LT3", ltms: "LT3", vanilla: "HT1", uhc: "LT1", pot: "HT2", nethop: "HT1", smp: "LT3", sword: "LT3", axe: "LT3", mace: "HT1" }},
        { name: "BlvckWlf", region: "EU", points: 226, status: "Combat Ace", tiers: { overall: "HT3", ltms: "HT1", vanilla: "LT1", uhc: "LT3", pot: "HT3", nethop: "LT2", smp: "HT1", sword: "HT3", axe: "LT1", mace: "LT2" }}
    ];

    const container = document.getElementById('leaderboard-container');
    const headerTitle = document.getElementById('matrix-header-title');
    const tabs = document.querySelectorAll('.nav-tab');

    function renderLeaderboard(mode) {
        container.innerHTML = '';
        headerTitle.textContent = mode === 'overall' ? 'Tiers Matrix' : `${mode} Tier`;

        let sortedPlayers = [...playersDatabase];
        if (mode !== 'overall') {
            sortedPlayers.sort((a, b) => a.tiers[mode].localeCompare(b.tiers[mode]));
        }

        sortedPlayers.forEach((player, index) => {
            const row = document.createElement('div');
            row.className = `row-grid player-row`;
            
            let tierDisplayHTML = '';
            if (mode === 'overall') {
                tierDisplayHTML = `
                    <div class="tier-matrix-row">
                        <div class="tier-node node-ht">⚔️ ${player.tiers.ltms}</div>
                        <div class="tier-node node-ht">💎 ${player.tiers.vanilla}</div>
                        <div class="tier-node node-lt">🧪 ${player.tiers.pot}</div>
                    </div>`;
            } else {
                const specificTier = player.tiers[mode];
                const isHighTier = specificTier.startsWith('HT');
                tierDisplayHTML = `
                    <div class="tier-matrix-row">
                        <div class="tier-node ${isHighTier ? 'node-ht' : 'node-lt'}">${specificTier}</div>
                    </div>`;
            }

            row.innerHTML = `
                <div class="rank-label">${index + 1}</div>
                <div class="skin-box">
                    <img src="https://mc-heads.net/head/${player.name}/100" class="skin-avatar" alt="${player.name}">
                </div>
                <div class="player-identity">
                    <span class="username">${player.name}</span>
                    <span class="rank-status">${player.status} <span class="points">(${player.points} pts)</span></span>
                </div>
                <div><span class="region-badge reg-${player.region.toLowerCase()}">${player.region}</span></div>
                ${tierDisplayHTML}
            `;
            container.appendChild(row);
        });
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderLeaderboard(tab.getAttribute('data-mode'));
        });
    });

    renderLeaderboard('overall');
</script>

</body>
