<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᴘᴀʀᴀᴅᴏx-ᴘᴠᴘ — Rankings</title>
    <style>
        :root {
            --bg-base: #090d16;
            --bg-panel: rgba(10, 15, 30, 0.75);
            --bg-row-hover: rgba(30, 41, 59, 0.5);
            --border-ui: rgba(255, 255, 255, 0.08);
            
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --color-na: #ef4444;
            --color-eu: #10b981;

            --color-ht: #f59e0b;
            --bg-ht: rgba(245, 158, 11, 0.15);
            --color-lt: #a855f7;
            --bg-lt: rgba(168, 85, 247, 0.15);
            
            --gold: #fbbf24;
            --silver: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Fixed Background Container for TikTok Embed */
        .video-background-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-background-wrapper iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            border: none;
            opacity: 0.35;
            filter: blur(2px) brightness(0.85) contrast(1.1);
        }

        .video-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle, rgba(9, 13, 22, 0.2) 0%, rgba(9, 13, 22, 0.92) 100%);
        }

        .wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 1;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Category Tabs Navigation Bar */
        .category-nav-bar {
            display: flex;
            gap: 6px;
            padding: 8px 4px 0 4px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-ui);
        }
        .category-nav-bar::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 82px;
            padding: 12px 10px;
            background: rgba(10, 15, 30, 0.4);
            border: 1px solid var(--border-ui);
            border-bottom: none;
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-tab-icon-wrapper {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .nav-tab-icon-wrapper svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .nav-tab-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .nav-tab:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .nav-tab:hover .nav-tab-icon-wrapper {
            transform: translateY(-2px);
            opacity: 0.8;
        }

        .nav-tab.active {
            background: var(--bg-panel);
            border-color: var(--border-ui);
            border-bottom: 1px solid transparent;
            z-index: 2;
        }
        .nav-tab.active .nav-tab-label {
            color: var(--text-main);
        }
        .nav-tab.active .nav-tab-icon-wrapper {
            opacity: 1;
            transform: scale(1.05);
        }
        
        .nav-tab.active .nav-tab-icon-wrapper { color: #38bdf8; }
        .nav-tab[data-mode="overall"].active .nav-tab-icon-wrapper { color: #fbbf24; }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #38bdf8;
        }
        .nav-tab[data-mode="overall"].active::after {
            background-color: #fbbf24;
        }

        /* Main Leaderboard Table Panel */
        .leaderboard-panel {
            background-color: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-ui);
            border-top: none;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            padding: 16px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .row-grid {
            display: grid;
            grid-template-columns: 55px 75px 1fr 100px 240px;
            align-items: center;
            padding: 14px 20px;
        }

        .table-header {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-ui);
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        .text-right { text-align: right; }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .player-row {
            border-radius: 12px;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            border: 1px solid transparent;
        }

        .player-row:hover {
            background-color: var(--bg-row-hover);
            border-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .player-row:nth-child(1) .rank-label { color: var(--gold); }
        .player-row:nth-child(2) .rank-label { color: var(--silver); }

        .rank-label {
            font-size: 18px;
            font-weight: 800;
            font-style: italic;
            color: var(--text-muted);
        }

        .skin-box {
            position: relative;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skin-avatar {
            width: 95%;
            height: 95%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .player-identity {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-left: 8px;
        }

        .username {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .rank-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .points {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .region-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            width: fit-content;
            text-align: center;
        }
        .reg-na { color: var(--color-na); background: rgba(239, 68, 68, 0.15); }
        .reg-eu { color: var(--color-eu); background: rgba(16, 185, 129, 0.15); }

        .tier-matrix-row {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .tier-node {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .node-ht { color: var(--color-ht); background: var(--bg-ht); border-color: rgba(245, 158, 11, 0.25); }
        .node-lt { color: var(--color-lt); background: var(--bg-lt); border-color: rgba(168, 85, 247, 0.25); }

        /* Modal / Profile Overlay Setup */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 6, 10, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-mask.open {
            opacity: 1;
            pointer-events: auto;
        }

        .profile-modal {
            background: #0d1321;
            border: 1px solid var(--border-ui);
            width: 100%;
            max-width: 620px;
            border-radius: 24px;
            padding: 32px;
            position: relative;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
            transform: scale(0.95);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-mask.open .profile-modal {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }

        .profile-top {
            display: flex;
            gap: 24px;
            align-items: center;
            border-bottom: 1px solid var(--border-ui);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }

        .profile-avatar-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar {
            width: 85%;
            height: 85%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .profile-meta h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .badge-strip {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .badge-node {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.08);
            letter-spacing: 0.5px;
        }
        .b-staff { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .b-top10 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .b-tourney { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .stat-card .value { font-size: 18px; font-weight: 800; color: var(--text-main); }

        .all-modes-header {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .all-modes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .mode-tier-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .mode-tier-item .m-name { font-weight: 600; color: #94a3b8; }
        .mode-tier-item .m-val { font-weight: 800; }
        .m-ht { color: var(--color-ht); }
        .m-lt { color: var(--color-lt); }

        @media (max-width: 900px) {
            .row-grid { grid-template-columns: 45px 70px 1fr 80px; }
            .tier-matrix-row, .table-header .text-right { display: none; }
            .stats-grid, .all-modes-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

    const container = document.getElementById('leaderboard-container');
    const headerTitle = document.getElementById('matrix-header-title');
    const tabs = document.querySelectorAll('.nav-tab');

    function renderLeaderboard(mode) {
        container.innerHTML = '';
        headerTitle.textContent = mode === 'overall' ? 'Tiers Matrix' : `${mode} Tier`;

        let sortedPlayers = [...playersDatabase];
        if (mode !== 'overall') {
            sortedPlayers.sort((a, b) => a.tiers[mode].localeCompare(b.tiers[mode]));
        }

        sortedPlayers.forEach((player, index) => {
            const row = document.createElement('div');
            row.className = `row-grid player-row`;
            row.setAttribute('onclick', `openProfile("${player.name}")`);
            
            let tierDisplayHTML = '';
            if (mode === 'overall') {
                tierDisplayHTML = `
                    <div class="tier-matrix-row">
                        <div class="tier-node node-ht">⚔️ ${player.tiers.ltms}</div>
                        <div class="tier-node node-ht">💎 ${player.tiers.vanilla}</div>
                        <div class="tier-node node-lt">🧪 ${player.tiers.pot}</div>
                    </div>`;
            } else {
                const specificTier = player.tiers[mode];
                const isHighTier = specificTier.startsWith('HT');
                tierDisplayHTML = `
                    <div class="tier-matrix-row">
                        <div class="tier-node ${isHighTier ? 'node-ht' : 'node-lt'}">${specificTier}</div>
                    </div>`;
            }

            row.innerHTML = `
                <div class="rank-label">${index + 1}</div>
                <div class="skin-box">
                    <img src="https://mc-heads.net/head/${player.name}/100" class="skin-avatar" alt="${player.name}">
                </div>
                <div class="player-identity">
                    <span class="username">${player.name}</span>
                    <span class="rank-status">${player.status} <span class="points">(${player.points} pts)</span></span>
                </div>
                <div><span class="region-badge reg-${player.region.toLowerCase()}">${player.region}</span></div>
                ${tierDisplayHTML}
            `;
            container.appendChild(row);
        });
    }

    // Modal Control Logic
    function openProfile(username) {
        const player = playersDatabase.find(p => p.name === username);
        if (!player) return;

        document.getElementById('p-avatar').src = `https://mc-heads.net/head/${player.name}/100`;
        document.getElementById('p-username').textContent = player.name;
        
        const regNode = document.getElementById('p-region');
        regNode.textContent = player.region;
        regNode.className = `region-badge reg-${player.region.toLowerCase()}`;

        // Dynamic Badge rendering
        const badgeBox = document.getElementById('p-badges');
        badgeBox.innerHTML = '';
        player.badges.forEach(b => {
            const span = document.createElement('span');
            span.className = `badge-node b-${b}`;
            span.textContent = b === 'top10' ? 'Top 10' : b === 'tourney' ? 'Champion' : b;
            badgeBox.appendChild(span);
        });

        // Numerical Metric Loading
        document.getElementById('p-stat-tier').textContent = player.tiers.overall;
        document.getElementById('p-stat-wl').textContent = player.wl;
        document.getElementById('p-stat-matches').textContent = player.matches;
        document.getElementById('p-stat-elo').textContent = player.peakElo;

        // Populate Comprehensive Gamemode breakdown
        const grid = document.getElementById('p-modes-grid');
        grid.innerHTML = '';
        Object.entries(player.tiers).forEach(([mode, tier]) => {
            if (mode === 'overall') return;
            const isHT = tier.startsWith('HT');
            grid.innerHTML += `
                <div class="mode-tier-item">
                    <span class="m-name">${mode.toUpperCase()}</span>
                    <span class="m-val ${isHT ? 'm-ht' : 'm-lt'}">${tier}</span>
                </div>`;
        });

        document.getElementById('profile-modal-mask').classList.add('open');
    }

    function closeProfile() {
        document.getElementById('profile-modal-mask').classList.remove('open');
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderLeaderboard(tab.getAttribute('data-mode'));
        });
    });

    renderLeaderboard('overall');
</script>

</body>
</html>
